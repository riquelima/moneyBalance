name: Deploy to Vercel (main)

on:
  push:
    branches: [ "main" ]

concurrency:
  group: vercel-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ secrets.VERCEL_TOKEN != '' && secrets.VERCEL_PROJECT_ID != '' && secrets.VERCEL_ORG_ID != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Pull Vercel project and env
        run: npx vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}" --project="${{ secrets.VERCEL_PROJECT_ID }}" --org="${{ secrets.VERCEL_ORG_ID }}"
      - name: Build (prebuilt)
        run: npx vercel build --prod
      - name: Deploy to Vercel
        run: npx vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}" --project="${{ secrets.VERCEL_PROJECT_ID }}" --org="${{ secrets.VERCEL_ORG_ID }}"

