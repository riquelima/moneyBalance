<!DOCTYPE html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>FinanceFlow AI</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Zain:wght@300&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poetsen+One&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="https://i.imgur.com/fH0lMQq.png" sizes="180x180" />
    <link rel="icon" type="image/png" href="https://i.imgur.com/fH0lMQq.png" sizes="192x192" />
    <meta name="theme-color" content="#13ec5b" />
    <meta property="og:title" content="Money Balance - Sua Gestão Financeira" />
    <meta property="og:site_name" content="Money Balance" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://i.imgur.com/fH0lMQq.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Money Balance - Sua Gestão Financeira" />
    <style>
      body {
        font-family: 'Manrope', sans-serif;
        background-color: #F7F7F7;
        color: #000000;
        -webkit-tap-highlight-color: transparent;
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 600, 'GRAD' 0, 'opsz' 24;
      }
      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
          display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
          -ms-overflow-style: none;  /* IE and Edge */
          scrollbar-width: none;  /* Firefox */
      }
      .no-callout {
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }
      .no-callout * {
        -webkit-user-select: none !important;
        user-select: none !important;
      }
    </style>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: "#8854D0", /* Purple */
              secondary: "#20BF55", /* Green */
              accent: "#FFE66D", /* Yellow */
              danger: "#FF6B6B", /* Red */
              dark: "#000000",
              light: "#FFFFFF",
              
              /* Remap existing to Neo-Brutalist */
              "background-light": "#F7F7F7",
              "background-dark": "#000000",
              "surface-dark": "#121212",
              "surface-light": "#E0E0E0",
              "text-primary": "#000000",
              "text-secondary": "#4A4A4A",
              "text-inverse": "#FFFFFF",
              
              "primary-green": "#20BF55",
              "primary-blue": "#3867D6",
              "primary-teal": "#4ECDC4",
              "warning": "#FD9644",
              "success": "#20BF55",
            },
            fontFamily: {
              display: ["Manrope", "sans-serif"],
              zain: ["Zain", "sans-serif"],
            },
            boxShadow: {
              'neo': '4px 4px 0px 0px #000000',
              'neo-sm': '2px 2px 0px 0px #000000',
              'neo-lg': '6px 6px 0px 0px #000000',
              'metallic': 'none', /* Disable old shadows */
              'glow-green': 'none',
            },
            borderWidth: {
              '3': '3px',
            },
            borderRadius: {
              'none': '0',
              'sm': '2px',
              'DEFAULT': '4px',
              'md': '6px',
              'lg': '8px',
              'xl': '10px', 
              /* Override large radius to be sharper */
              '2xl': '8px',
              '3xl': '12px',
            }
          }
        }
      }
    </script>
  

</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
