<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <script>
      // Initialize theme immediately to prevent FOUC
      // Default is LIGHT. Only enable DARK if explicitly saved as 'dark'.
      try {
        if (localStorage.getItem('theme') === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      } catch (_) {}
    </script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>FinanceFlow AI</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Zain:wght@300&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poetsen+One&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="https://i.imgur.com/fH0lMQq.png" sizes="180x180" />
    <link rel="icon" type="image/png" href="https://i.imgur.com/fH0lMQq.png" sizes="192x192" />
    <meta name="theme-color" content="#13ec5b" />
    <meta property="og:title" content="Money Balance - Sua Gestão Financeira" />
    <meta property="og:site_name" content="Money Balance" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://i.imgur.com/fH0lMQq.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Money Balance - Sua Gestão Financeira" />
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
        color: #1f2937;
        -webkit-tap-highlight-color: transparent;
        min-height: 100vh;
        padding-bottom: env(safe-area-inset-bottom);
        overscroll-behavior-y: none;
      }
      .dark body {
        background: linear-gradient(135deg, #111827 0%, #000000 100%);
        color: #f3f4f6;
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
      }
      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
          display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
          -ms-overflow-style: none;  /* IE and Edge */
          scrollbar-width: none;  /* Firefox */
      }
      .no-callout {
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }
      .no-callout * {
        -webkit-user-select: none !important;
        user-select: none !important;
      }
      /* Custom Scrollbar for list scroll areas */
      .custom-scrollbar::-webkit-scrollbar {
        width: 5px;
        height: 5px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(0, 0, 0, 0.12);
        border-radius: 9999px;
      }
      .dark .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.12);
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: rgba(0, 0, 0, 0.25);
      }
      .dark .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.25);
      }
    </style>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: "#8854D0", /* Purple */
              secondary: "#20BF55", /* Green */
              accent: "#FFE66D", /* Yellow */
              danger: "#FF6B6B", /* Red */
              dark: "#1A1A1A",
              light: "#FFFFFF",
              
              /* Glassmorphism System Colors */
              "glass-border": "rgba(255, 255, 255, 0.1)",
              "glass-border-dark": "rgba(255, 255, 255, 0.05)",
              "glass-surface": "rgba(255, 255, 255, 0.7)",
              "glass-surface-dark": "rgba(0, 0, 0, 0.6)",
              
              "background-light": "#F3F4F6",
              "background-dark": "#000000",
              "surface-dark": "#1C1C1E",
              "surface-light": "#FFFFFF",
              "text-primary": "#1F2937",
              "text-secondary": "#6B7280",
              "text-inverse": "#FFFFFF",
              
              "primary-green": "#34C759", /* iOS Green */
              "primary-blue": "#007AFF", /* iOS Blue */
              "primary-teal": "#30B0C7", /* iOS Teal */
              "warning": "#FF9500", /* iOS Orange */
              "success": "#34C759", /* iOS Green */
            },
            fontFamily: {
              display: ["Manrope", "sans-serif"],
              zain: ["Zain", "sans-serif"],
            },
            boxShadow: {
              'glass': '0 8px 32px 0 rgba(31, 38, 135, 0.07)',
              'glass-sm': '0 4px 16px 0 rgba(31, 38, 135, 0.05)',
              'glass-lg': '0 12px 40px 0 rgba(31, 38, 135, 0.15)',
              'glow': '0 0 20px rgba(136, 84, 208, 0.3)',
            },
            borderRadius: {
              'none': '0',
              'sm': '0.125rem',
              'DEFAULT': '0.25rem',
              'md': '0.375rem',
              'lg': '0.5rem',
              'xl': '0.75rem', 
              '2xl': '1rem',
              '3xl': '1.5rem',
              'full': '9999px',
            },
            backdropBlur: {
              'xs': '2px',
            }
          }
        }
      }
    </script>
  

</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
